<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ストップウォッチ</title>
  </head>
  <body>
    <style>
      body {
        display: grid;
        place-items: center;
        height: 100vh;
      }
      #back {
        background-color: #55ff55;
        text-align: center;
        padding: 1rem;
        border-radius: 8px;
      }
      #timer,
      #start,
      #stop,
      #reset {
        background-color: #000;
        color: #fff;
        border-radius: 8px;
        border: none;
        padding: 0.5rem 1.5rem;
      }
      #start,
      #stop,
      #reset {
        cursor: pointer;
      }
      #timer {
        font-size: 2rem;
        margin-bottom: 0.5rem;
      }
      #start:disabled,
      #stop:disabled,
      #reset:disabled {
        background-color: rgba(77, 77, 77, 0.5);
        color: rgba(255, 255, 255, 0.9);
        cursor: auto;
      }
    </style>

    <div id="back">
      <div id="timer">00:00.00</div>
      <div class="flex">
        <input type="button" id="start" value="start" />
        <input type="button" id="stop" value="stop" disabled />
        <input type="button" id="reset" value="reset" disabled />
      </div>
    </div>

    <script>
      const timer = document.getElementById("timer");
      const startBt = document.getElementById("start");
      const stopBt = document.getElementById("stop");
      const resetBt = document.getElementById("reset");

      let startTime;
      let intervalTimer;
      let elapsedTime;
      let holdTime = 0;

      function pad(num) {
        return String(num).padStart(2, "0");
      }

      startBt.addEventListener("click", () => {
        startTime = Date.now();

        intervalTimer = setInterval(() => {
          elapsedTime = Date.now() - startTime + holdTime;

          let minutes = Math.floor((elapsedTime / 1000 / 60) % 60);
          let seconds = Math.floor((elapsedTime / 1000) % 60);
          let milliseconds = Math.floor((elapsedTime % 1000) / 10);

          timer.textContent = `${pad(minutes)}:${pad(seconds)}.${pad(
            milliseconds
          )}`;
        }, 10);

        startBt.disabled = true;
        stopBt.disabled = false;
        resetBt.disabled = true;
      });

      stopBt.addEventListener("click", () => {
        clearInterval(intervalTimer);
        holdTime += Date.now() - startTime;

        startBt.disabled = false;
        stopBt.disabled = true;
        resetBt.disabled = false;
      });

      resetBt.addEventListener("click", () => {
        timer.textContent = "00:00.00";
        holdTime = 0;

        startBt.disabled = false;
        stopBt.disabled = true;
        resetBt.disabled = true;
      });
    </script>
  </body>
</html>
